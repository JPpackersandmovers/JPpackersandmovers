<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JP Packers & Movers - Live Booking Portal</title>
    <!-- FontAwesome for Premium Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --purple: #4A154B;
            --dark-purple: #320E33;
            --white: #FFFFFF;
            --light-gray: #F8F9FA;
            --text-dark: #222222;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--light-gray);
            color: var(--text-dark);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        /* App Layout Container (Keeps everything inside like a real app dashboard) */
        .app-container {
            width: 100%;
            max-width: 480px;
            background: var(--white);
            border-radius: 24px;
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.12);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            border: 1px solid rgba(74, 21, 75, 0.1);
        }

        /* Top Bar Custom Branding Header */
        .app-header {
            background: var(--purple);
            padding: 20px;
            color: var(--white);
            text-align: center;
            border-bottom: 3px solid #D4AF37; /* Subtle gold divider line */
        }

        .brand-title {
            font-size: 22px;
            font-weight: 800;
            letter-spacing: 0.5px;
            margin-bottom: 4px;
        }

        .brand-tagline {
            font-size: 12px;
            opacity: 0.9;
        }

        /* Main Content App Body */
        .app-body {
            padding: 20px;
            flex-grow: 1;
        }

        /* Interactive Grid Toggles (NoBroker Style) */
        .services-section {
            margin-bottom: 24px;
        }

        .section-title {
            font-size: 14px;
            font-weight: 700;
            color: var(--purple);
            text-transform: uppercase;
            margin-bottom: 12px;
            letter-spacing: 0.5px;
        }

        .services-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
        }

        .service-card {
            background: var(--light-gray);
            border: 1px solid #E0E0E0;
            border-radius: 12px;
            padding: 12px 8px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .service-card i {
            font-size: 20px;
            color: var(--purple);
            margin-bottom: 6px;
        }

        .service-card p {
            font-size: 11px;
            font-weight: 600;
        }

        /* Active highlight for services */
        .service-card.active {
            background: var(--purple);
            border-color: var(--purple);
            color: var(--white);
        }

        .service-card.active i {
            color: var(--white);
        }

        /* Portal Form Dashboard Fields */
        .form-group {
            margin-bottom: 16px;
        }

        .form-group label {
            display: block;
            font-size: 12px;
            font-weight: 600;
            margin-bottom: 6px;
            color: #555;
        }

        .input-wrapper {
            position: relative;
        }

        .input-wrapper i {
            position: absolute;
            left: 12px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--purple);
            font-size: 14px;
        }

        .form-control {
            width: 100%;
            padding: 12px 12px 12px 38px;
            border: 1px solid #CCCCCC;
            border-radius: 12px;
            font-size: 14px;
            outline: none;
            transition: all 0.3s ease;
        }

        .form-control:focus {
            border-color: var(--purple);
            box-shadow: 0 0 0 3px rgba(74, 21, 75, 0.1);
        }

        select.form-control {
            appearance: none;
        }

        /* Premium Booking Action Button */
        .btn-submit {
            width: 100%;
            background: #25D366; /* WhatsApp Green for instant click-through trust */
            color: var(--white);
            border: none;
            padding: 15px;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            margin-top: 20px;
            transition: background 0.3s ease;
            box-shadow: 0 4px 12px rgba(37, 211, 102, 0.3);
        }

        .btn-submit:hover {
            background: #20BA56;
        }

        /* Bottom Fixed Brand Coordinates Block */
        .app-footer {
            background: var(--dark-purple);
            color: var(--white);
            padding: 20px;
            text-align: center;
            font-size: 12px;
            line-height: 1.6;
        }

        .footer-line {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin-bottom: 6px;
            opacity: 0.9;
        }

        .footer-line i {
            color: #D4AF37;
        }
    </style>
</head>
<body>

    <!-- Main Platform Body Frame -->
    <div class="app-container">
        
        <!-- Header Section -->
        <div class="app-header">
            <div class="brand-title">JP PACKERS & MOVERS</div>
            <div class="brand-tagline">SAFE • RELIABLE • ON TIME</div>
        </div>

        <!-- Dynamic Lead Generator Panel -->
        <div class="app-body">
            
            <!-- Quick Selection Interface Tabs -->
            <div class="services-section">
                <div class="section-title">Select Logistics Type</div>
                <div class="services-grid">
                    <div class="service-card active" onclick="selectService(this, 'Home Shifting')">
                        <i class="fa-solid fa-house-chimney"></i>
                        <p>Home Shift</p>
                    </div>
                    <div class="service-card" onclick="selectService(this, 'Office Relocation')">
                        <i class="fa-solid fa-building"></i>
                        <p>Office Move</p>
                    </div>
                    <div class="service-card" onclick="selectService(this, 'Vehicle Shifting')">
                        <i class="fa-solid fa-car"></i>
                        <p>Vehicle</p>
                    </div>
                </div>
            </div>

            <!-- Interactive Route Coordinates Form Fields -->
            <form id="quoteForm" onsubmit="sendToWhatsApp(event)">
                
                <div class="form-group">
                    <label>Your Name</label>
                    <div class="input-wrapper">
                        <i class="fa-solid fa-user"></i>
                        <input type="text" id="clientName" class="form-control" placeholder="Enter full name" required>
                    </div>
                </div>

                <div class="form-group">
                    <label>Pickup Location</label>
                    <div class="input-wrapper">
                        <i class="fa-solid fa-location-dot"></i>
                        <input type="text" id="pickupLoc" class="form-control" placeholder="From: Area or City" required>
                    </div>
                </div>

                <div class="form-group">
                    <label>Drop Location</label>
                    <div class="input-wrapper">
                        <i class="fa-solid fa-location-crosshairs"></i>
                        <input type="text" id="dropLoc" class="form-control" placeholder="To: Destination Area or City" required>
                    </div>
                </div>

                <div class="form-group">
                    <label>Household Inventory Size</label>
                    <div class="input-wrapper">
                        <i class="fa-solid fa-box-open"></i>
                        <select id="houseSize" class="form-control" required>
                            <option value="1 BHK">1 BHK Apartment</option>
                            <option value="2 BHK">2 BHK Apartment</option>
                            <option value="3 BHK">3 BHK Apartment</option>
                            <option value="1 RK / Studio">1 RK / Studio Flat</option>
                            <option value="Commercial Office">Commercial Corporate Space</option>
                            <option value="Few Core Items Only">Few Selected Items Only</option>
                        </select>
                    </div>
                </div>

                <div class="form-group">
                    <label>Movement Allocation Date</label>
                    <div class="input-wrapper">
                        <i class="fa-solid fa-calendar-days"></i>
                        <input type="date" id="shiftDate" class="form-control" required>
                    </div>
                </div>

                <!-- Instant Dispatch Form Trigger -->
                <button type="submit" class="btn-submit">
                    <i class="fa-brands fa-whatsapp"></i> Get Instant WhatsApp Quote
                </button>
            </form>

        </div>

        <!-- Fixed App Footer Metadata Banner -->
        <div class="app-footer">
            <div class="footer-line">
                <i class="fa-solid fa-location-dot"></i>
                <span>F-32, Near Dindoshi Depot, Malad East, Mum-400097</span>
            </div>
            <div class="footer-line">
                <i class="fa-solid fa-envelope"></i>
                <span>jppmofficial@gmail.com</span>
            </div>
            <div class="footer-line">
                <i class="fa-solid fa-phone"></i>
                <span>+91 9326029760</span>
            </div>
        </div>

    </div>

    <!-- Active Routing Control Script Engine -->
    <script>
        let selectedServiceType = "Home Shifting";

        function selectService(element, serviceName) {
            // Remove active style state from all grids
            document.querySelectorAll('.service-card').forEach(card => card.classList.remove('active'));
            // Assign active target pointer state
            element.classList.add('active');
            selectedServiceType = serviceName;
        }

        function sendToWhatsApp(event) {
            event.preventDefault();

            // Extract values directly from client input nodes
            const name = document.getElementById('clientName').value;
            const pickup = document.getElementById('pickupLoc').value;
            const drop = document.getElementById('dropLoc').value;
            const size = document.getElementById('houseSize').value;
            const date = document.getElementById('shiftDate').value;

            // Clean string payload for API transport formatting
            const message = `*NEW BOOKING ENQUIRY - JP PACKERS & MOVERS*%0A%0A` +
                            `👤 *Client Name:* ${name}%0A` +
                            `📦 *Service:* ${selectedServiceType}%0A` +
                            `📍 *Pickup From:* ${pickup}%0A` +
                            `🏁 *Drop To:* ${drop}%0A` +
                            `🏠 *Size:* ${size}%0A` +
                            `📅 *Shifting Date:* ${date}`;

            // Redirects transaction parameter tracking payload directly to your number
            const whatsappUrl = `https://wa.me/919326029760?text=${message}`;
            window.open(whatsappUrl, '_blank');
        }
    </script>
</body>
</html>
